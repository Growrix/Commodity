version: 1
folder: DOC/project-plan/api-and-data
purpose: Freeze endpoint groups, schemas, events, status models, and retention rules.
primary_docs:
	- DOC/project-plan/api-and-data/README.md
	- DOC/project-plan/api-and-data/api-data-plan.md
required_inputs:
	- DOC/project-plan/shared-contracts/system-blueprint.md
