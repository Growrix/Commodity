version: 1
project:
  name: Universal Project Template
  type: adaptable application template
  summary: >-
    Reusable template for applications with public and authenticated surfaces,
    operational dashboards, content or data workflows, payments, messaging,
    notifications, and AI assistance. Replace or remove modules that do not apply
    to the current project.
  status: documentation-first
  canonical_docs_root: DOC/framework/guide/
  canonical_ai_entrypoint: DOC/framework/guide/ai/ai-context.yaml
  canonical_human_index: DOC/framework/guide/README.md

prompt_contract:
  always_reference_first:
    - DOC/framework/guide/ai/ai-context.yaml
  recommended_prompt_fields:
    - module
    - affected_roles
    - requested_change
    - business_rule
    - docs_to_follow
    - api_or_schema_impact
    - testing_expectation
  minimum_instruction: >-
    Start by reading DOC/framework/guide/ai/ai-context.yaml, then follow the listed read_path for the target module before coding.

tech_stack:
  frontend:
    - Next.js
    - React
    - Tailwind CSS
  backend:
    - Supabase Auth
    - Supabase Postgres
    - Supabase Realtime
    - Supabase Storage
    - Supabase Edge Functions
  payments:
    - Stripe
  ai:
    - OpenAI-compatible API
  hosting:
    - Vercel
    - Supabase Cloud
  mobile_phase:
    - React Native
    - Expo

core_invariants:
  - Hidden routes are not security boundaries; enforce authorization in middleware, APIs, and database policies.
  - Admin assigns work; developers never self-assign.
  - Queue integrity is critical; priority handling, ETA updates, cancellations, and assignments must be deterministic and auditable.
  - Delivered demos and projects are private by default; public exposure requires explicit approval.
  - Maintenance coverage begins automatically on delivery and lasts one year unless plan logic supersedes it.
  - UI must stay thin; server logic is authoritative for business state.
  - Contracts for routes, data, states, permissions, and integrations must be documented before cross-surface implementation starts.
  - Entitlements, quotas, rollout controls, and abuse protections are operational controls, not frontend-only concerns.
  - Do not introduce undocumented lifecycle states, routes, or cross-domain coupling.

quality_enforcement:
  protocol_doc: DOC/framework/guide/quality/enterprise-testing-and-quality-enforcement-v2.md
  completion_rule: all-required-quality-checks-must-pass
  mandatory_pipeline:
    - static_validation
    - unit_testing
    - integration_testing
    - ui_testing
    - responsive_mobile_testing
    - end_to_end_testing
    - seo_validation
    - accessibility_validation
    - performance_validation
    - security_validation
    - regression_testing
  failure_protocol:
    - stop
    - debug
    - fix
    - rerun_full_pipeline

surfaces:
  public:
    routes:
      - /
      - /demo-wall
      - /shop
      - /reviews
    roles:
      - visitor
      - client
    capabilities:
      - marketing
      - demo request intake
      - priority upsell
      - demo wall browsing
      - shop browsing
      - reviews
      - public AI assistant
  client:
    routes:
      - /dashboard
    roles:
      - client
    capabilities:
      - queue status
      - project timeline
      - chat
      - uploads
      - approvals
      - downloads
      - maintenance requests
  admin:
    routes:
      - /admin
    roles:
      - admin
    capabilities:
      - queue and batch control
      - assignments
      - shop and gallery management
      - maintenance oversight
      - reviews and notifications oversight
  developer:
    routes:
      - /team
    roles:
      - developer
    capabilities:
      - assigned work execution
      - deliverable uploads
      - backups
      - status updates
      - client chat

modules:
  authentication_and_roles:
    docs:
      - DOC/framework/guide/product/product-requirements.md
      - DOC/framework/guide/backend/auth-authorization-and-rls.md
      - DOC/framework/guide/operations/security-and-operations.md
    tables:
      - users
    key_rules:
      - No public admin or developer signup.
      - Role checks must exist in middleware, APIs, and RLS.
  demo_requests_and_queue:
    docs:
      - DOC/framework/guide/product/product-requirements.md
      - DOC/framework/guide/architecture/module-boundaries.md
      - DOC/framework/guide/data/data-model.md
      - DOC/framework/guide/backend/queue-payments-and-integrations.md
      - DOC/framework/guide/api/api-design.md
    tables:
      - batches
      - demo_requests
      - projects
    key_rules:
      - Batch capacity is enforced server-side.
      - Queue order and ETA are server-owned.
      - Assignment creates or updates project records transactionally.
  priority_payments:
    docs:
      - DOC/framework/guide/backend/queue-payments-and-integrations.md
      - DOC/framework/guide/api/api-design.md
      - DOC/framework/guide/operations/security-and-operations.md
    tables:
      - payments
      - demo_requests
    key_rules:
      - Priority status is granted only after verified payment success.
      - Webhooks must be idempotent and signature-verified.
  client_delivery_workspace:
    docs:
      - DOC/framework/guide/frontend/frontend-architecture.md
      - DOC/framework/guide/frontend/realtime-chat-and-client-resilience.md
      - DOC/framework/guide/backend/file-delivery-and-storage.md
      - DOC/framework/guide/data/data-model.md
    tables:
      - projects
      - messages
      - project_backups
      - maintenance_requests
    key_rules:
      - Chat is scoped to assigned work.
      - File access is permission-checked server-side.
  public_proof_and_shop:
    docs:
      - DOC/framework/guide/product/product-requirements.md
      - DOC/framework/guide/backend/file-delivery-and-storage.md
      - DOC/framework/guide/frontend/ui-ux-standards.md
      - DOC/framework/guide/data/data-model.md
    tables:
      - demo_gallery
      - shop_items
      - shop_orders
      - google_reviews
    key_rules:
      - Public visibility is explicit and approved.
      - Marketplace credibility does not imply third-party file delivery.
  maintenance_and_support:
    docs:
      - DOC/framework/guide/product/product-requirements.md
      - DOC/framework/guide/data/data-model.md
      - DOC/framework/guide/api/api-design.md
    tables:
      - maintenance_contracts
      - maintenance_requests
    key_rules:
      - Maintenance starts automatically on delivery.
      - Expired coverage requires plan logic or denial handling.
  notifications_and_ai:
    docs:
      - DOC/framework/guide/ai/ai-collaboration-playbook.md
      - DOC/framework/guide/api/api-design.md
      - DOC/framework/guide/backend/backend-observability-and-reliability.md
    tables:
      - notifications
      - ai_chat_logs
    key_rules:
      - AI is read-only against operational state unless explicitly documented otherwise.
      - Notification failures must not corrupt business state.

status_models:
  demo_request_status:
    - requested
    - assigned
    - in_progress
    - delivered
    - converted
    - cancelled
  project_status:
    - assigned
    - in_progress
    - delivered
    - maintenance
    - closed
  payment_status:
    - pending
    - paid
    - failed
    - refunded
  maintenance_request_status:
    - open
    - in_progress
    - resolved

frontend_rules:
  source_docs:
    - DOC/framework/guide/frontend/frontend-rules-and-design-system.md
    - DOC/framework/guide/frontend/frontend-architecture.md
    - DOC/framework/guide/frontend/ui-ux-standards.md
    - DOC/framework/guide/frontend/component-and-styling-standards.md
    - DOC/framework/guide/frontend/data-fetching-and-state.md
  mandatory:
    - No hardcoded design values; use centralized design system tokens and primitives.
    - Keep role surfaces separated.
    - Keep server state authoritative.
    - Explicitly handle loading, empty, error, reconnect, and permission states.
    - Use accessible and responsive UI patterns.

backend_rules:
  source_docs:
    - DOC/framework/guide/backend/backend-architecture.md
    - DOC/framework/guide/backend/service-design-and-domain-rules.md
    - DOC/framework/guide/backend/auth-authorization-and-rls.md
    - DOC/framework/guide/backend/queue-payments-and-integrations.md
    - DOC/framework/guide/backend/file-delivery-and-storage.md
    - DOC/framework/guide/operations/platform-governance-and-controls.md
  mandatory:
    - Put business rules in domain services.
    - Validate all inputs and status transitions.
    - Fail closed on authorization.
    - Keep payment, queue, and assignment flows idempotent where needed.
    - Protect private files through scoped delivery patterns.
    - Treat entitlements, quotas, and rollout controls as server-authoritative policies.

