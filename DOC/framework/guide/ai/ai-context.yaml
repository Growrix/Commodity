ai_output_expectations:
  when_changing_behavior:
    - update relevant docs
    - update tests for critical logic
    - preserve module boundaries
    - state assumptions explicitly when requirements are incomplete
  completion_discipline:
    - confirm zero-gate pass before declaring done
    - commit locally with a clear message
    - never push or merge without explicit instruction
    - output must include what changed, docs updated, validations run, commit hash, and remaining risks
  reference_doc: DOC/framework/guide/ai/ai-collaboration-playbook.md

index:
  docs_index: DOC/framework/guide/README.md
  workspace_instructions: .github/copilot-instructions.md
  ai_playbook: DOC/framework/guide/ai/ai-collaboration-playbook.md
  frontend_design_system_rules: DOC/framework/guide/frontend/frontend-rules-and-design-system.md
  quality_enforcement_protocol: DOC/framework/guide/quality/enterprise-testing-and-quality-enforcement-v2.md